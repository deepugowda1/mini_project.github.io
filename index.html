<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriPredict Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6f9;}

.sidebar{
    width:250px;height:100vh;background:#1e293b;color:white;
    padding:20px;position:fixed;
}
.sidebar a{display:block;color:white;margin:12px 0;text-decoration:none;}

.main{margin-left:250px;width:100%;padding:20px;}

.filters{margin-bottom:20px;display:flex;gap:10px;}
select{padding:10px;border-radius:8px;border:1px solid #ccc;}

.cards{display:flex;gap:20px;flex-wrap:wrap;}
.card{
    background:white;padding:20px;border-radius:12px;
    flex:1;min-width:200px;
}

.crop-img{text-align:center;margin-top:20px;}
.crop-img img{width:200px;border-radius:10px;}

canvas{margin-top:30px;background:white;padding:20px;border-radius:12px;}

@media(max-width:768px){
    body{flex-direction:column;}
    .sidebar{width:100%;height:auto;display:flex;justify-content:space-around;}
    .main{margin-left:0;}
    .filters{flex-direction:column;}
    select{width:100%;}
    .cards{flex-direction:column;}
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>AgriPredict</h2>
    <a href="#">Dashboard</a>
</div>

<div class="main">

<h3 id="dateTime"></h3>
<h1>Crop Price Prediction (₹/kg)</h1>

<div class="filters">
    <select id="state"></select>
    <select id="district"></select>
    <select id="crop"></select>
</div>

<div class="cards">
    <div class="card">
        <h3>Current Price</h3>
        <p id="currentPrice">₹ --</p>
    </div>

    <div class="card">
        <h3>6-Month Prediction</h3>
        <p id="predictedPrice">₹ --</p>
    </div>

    <div class="card">
        <h3>Market</h3>
        <p id="market">--</p>
    </div>
</div>

<div class="crop-img">
    <img id="cropImage" src="https://via.placeholder.com/200">
</div>

<canvas id="priceChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
